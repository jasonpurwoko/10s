<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10s — Tennis Tracker</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --surface: #242424;
      --surface2: #2e2e2e;
      --border: #3a3a3a;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #3db88c;
      --accent-dim: rgba(61, 184, 140, 0.12);
      --green: #3db88c;
      --green-dim: #2a4a3e;
      --blue: #5b8af0;
      --purple: #9b6ef0;
      --orange: #e89b4e;
      --red: #e85b5b;
      --radius: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 14px;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      z-index: 100;
    }

    .logo { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .logo span { color: var(--accent); }
    .logo-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 28px; letter-spacing: 0.5px; text-transform: uppercase; }

    nav { display: flex; flex-direction: column; gap: 2px; }
    nav button {
      background: none; border: none; color: var(--text-muted); font-size: 13px;
      padding: 9px 12px; border-radius: 7px; cursor: pointer; text-align: left;
      display: flex; align-items: center; gap: 9px; transition: all 0.15s; font-family: inherit;
    }
    nav button:hover { background: var(--surface2); color: var(--text); }
    nav button.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; }
    nav button svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* Main */
    .main {
      margin-left: 220px;
      flex: 1;
      padding: 28px 36px;
      max-width: 1000px;
    }

    .page { display: none; }
    .page.active { display: block; }

    h1 { font-size: 24px; font-weight: 700; margin-bottom: 20px; }
    h2 { font-size: 16px; font-weight: 600; margin-bottom: 14px; }

    /* Dashboard Header */
    .dash-header {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    /* Stat Cards Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }

    .stat-card .label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
    .stat-card .value { font-size: 30px; font-weight: 700; line-height: 1.1; }
    .stat-card .sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

    /* Dashboard 2x2 Grid */
    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; }

    .card-action {
      display: inline-flex; align-items: center; gap: 4px; margin-top: 16px;
      font-size: 12px; color: var(--text); background: var(--surface2);
      border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px;
      cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .card-action:hover { background: var(--border); }

    /* Streak Circles */
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .cal-header .cal-title { font-size: 14px; font-weight: 600; }
    .cal-header button { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
    .cal-header button:hover { color: var(--text); background: var(--border); }
    .cal-header button:disabled { opacity: 0.3; cursor: default; }
    .cal-header button:disabled:hover { color: var(--text-muted); background: var(--surface2); }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }
    .cal-weekdays div { font-size: 10px; color: var(--text-muted); text-transform: uppercase; text-align: center; letter-spacing: 0.5px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 14px; }
    .cal-day { aspect-ratio: 1; border-radius: 6px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text-muted); }
    .cal-day.empty { background: none; }
    .cal-day.has-session { background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; }
    .cal-day.has-session:hover { opacity: 0.8; }
    .cal-day.today { border: 2px solid var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
    .cal-day-sessions { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; }
    .cal-day-sessions .cal-day-label { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .cal-stats { font-size: 12px; color: var(--text-muted); }
    .cal-stats strong { color: var(--text); font-weight: 700; }

    /* Recent Sessions */
    .session-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.15s;
    }
    .session-row:last-of-type { border-bottom: none; }
    .session-row:hover { opacity: 0.7; }
    .session-row .name { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-row .date { font-size: 12px; color: var(--text-muted); width: 70px; text-align: right; flex-shrink: 0; }
    .session-row .dur { font-size: 12px; color: var(--text-muted); text-align: right; width: 55px; flex-shrink: 0; }
    .session-row .vid-badge {
      font-size: 10px; background: var(--purple); color: #fff; padding: 2px 6px;
      border-radius: 3px; margin-left: 6px; font-weight: 600;
    }

    /* Goals */

    /* ---------- Session Detail ---------- */
    .detail-back {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-muted); font-size: 13px; cursor: pointer;
      margin-bottom: 16px; background: none; border: none; font-family: inherit;
    }
    .detail-back:hover { color: var(--text); }
    .detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
    .detail-header h1 { margin-bottom: 4px; }
    .detail-meta { font-size: 13px; color: var(--text-muted); }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .detail-field .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .detail-field .value { font-size: 15px; font-weight: 500; }

    .tag { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; }
    .tag-rally { background: rgba(91, 138, 240, 0.15); color: var(--blue); }
    .tag-match { background: rgba(232, 91, 91, 0.15); color: var(--red); }
    .tag-drill { background: rgba(61, 184, 140, 0.15); color: var(--green); }
    .tag-tiebreak { background: rgba(232, 155, 78, 0.15); color: var(--orange); }
    .tag-serve-practice { background: rgba(232, 200, 78, 0.15); color: #e8c84e; }
    .tag-vod-review { background: rgba(155, 110, 240, 0.15); color: var(--purple); }

    .rating { display: flex; gap: 3px; }
    .rating .star { color: var(--border); font-size: 16px; }
    .rating .star.filled { color: var(--accent); }
    .skill-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .skill-tag { font-size: 11px; padding: 3px 8px; border-radius: 4px; background: var(--surface2); color: var(--text-muted); }

    /* ---------- Log Form ---------- */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { margin-bottom: 0; }
    .form-group.full { grid-column: 1 / -1; }

    .form-group label {
      display: block; font-size: 11px; color: var(--text-muted);
      margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; padding: 9px 12px; color: var(--text);
      font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.15s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 70px; }

    .btn {
      background: var(--accent); color: var(--bg); border: none;
      padding: 9px 18px; border-radius: 7px; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: opacity 0.15s; font-family: inherit;
    }
    .btn:hover { opacity: 0.85; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: rgba(232, 91, 91, 0.15); color: var(--red); }
    .btn-row { display: flex; gap: 10px; margin-top: 18px; align-items: center; }

    .rating-input { display: flex; gap: 3px; }
    .rating-input .star {
      font-size: 20px; cursor: pointer; color: var(--border);
      background: none; border: none; transition: color 0.1s;
    }
    .rating-input .star.filled { color: var(--accent); }
    .rating-input .star:hover { color: var(--accent); }

    /* ---------- Video Upload ---------- */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }

    .upload-icon {
      width: 36px; height: 36px; margin: 0 auto 10px;
      color: var(--text-muted); opacity: 0.6;
    }

    .upload-zone p { font-size: 13px; color: var(--text-muted); }
    .upload-zone .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; opacity: 0.7; }

    .upload-preview-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }

    .upload-preview-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
    }

    .upload-preview-item video {
      width: 80px;
      height: 50px;
      object-fit: cover;
      border-radius: 4px;
      background: #000;
    }

    .upload-preview-item .file-info { flex: 1; min-width: 0; }
    .upload-preview-item .file-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .upload-preview-item .file-size { font-size: 11px; color: var(--text-muted); }

    .upload-preview-item .remove-btn {
      background: none; border: none; color: var(--red); cursor: pointer;
      font-size: 16px; padding: 4px; line-height: 1; opacity: 0.7;
    }
    .upload-preview-item .remove-btn:hover { opacity: 1; }

    /* ---------- Video Player in Detail ---------- */
    .video-section { margin-top: 14px; }
    .video-section .card-title { margin-bottom: 12px; }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .video-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .video-card video {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      display: block;
    }

    .video-card .video-info {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .video-card .video-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .video-card .video-size { font-size: 11px; color: var(--text-muted); }
    .video-card .video-delete {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 13px; padding: 2px 6px; border-radius: 4px;
    }
    .video-card .video-delete:hover { color: var(--red); background: rgba(232,91,91,0.1); }

    /* Videos page */
    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .videos-grid .video-thumb-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .videos-grid .video-thumb-card:hover { border-color: var(--accent); }

    .videos-grid .video-thumb-card video {
      width: 100%; aspect-ratio: 16/9; background: #000; display: block; pointer-events: none;
    }

    .videos-grid .video-thumb-card .thumb-info {
      padding: 12px;
    }

    .videos-grid .video-thumb-card .thumb-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
    .videos-grid .video-thumb-card .thumb-meta { font-size: 11px; color: var(--text-muted); }



    .empty-state { text-align: center; padding: 36px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 32px; margin-bottom: 10px; opacity: 0.5; }
    .empty-state p { font-size: 13px; }

    /* Modals */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; width: 400px; max-width: 90vw;
      max-height: 80vh; overflow-y: auto;
    }
    .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .modal .form-group { margin-bottom: 12px; }

    /* Videos / Clips */
    .yt-import-row {
      display: flex; gap: 8px; margin-bottom: 8px;
    }
    .yt-import-row input { flex: 1; }
    .yt-import-row button {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: 7px; padding: 9px 14px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit; white-space: nowrap;
    }
    .yt-import-row button:hover { background: var(--border); }

    .yt-preview-list { display: flex; flex-direction: column; gap: 6px; }
    .yt-preview-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px;
    }
    .yt-preview-item img {
      width: 80px; height: 45px; object-fit: cover; border-radius: 4px; background: #000;
    }
    .yt-preview-item .file-info { flex: 1; min-width: 0; }
    .yt-preview-item .file-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .yt-preview-item .file-size { font-size: 11px; color: var(--text-muted); }
    .yt-preview-item .remove-btn {
      background: none; border: none; color: var(--red); cursor: pointer;
      font-size: 16px; padding: 4px; line-height: 1; opacity: 0.7;
    }
    .yt-preview-item .remove-btn:hover { opacity: 1; }
    .reorder-btn {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 4px; cursor: pointer; font-size: 9px; padding: 2px 5px; font-family: inherit;
    }
    .reorder-btn:hover { background: var(--border); color: var(--text); }

    .clips-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .clips-header h1 { margin-bottom: 0; }

    .clips-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px;
    }
    .clip-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; cursor: pointer; transition: border-color 0.15s;
    }
    .clip-card:hover { border-color: var(--accent); }
    .clip-card img, .clip-card video {
      width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #000;
    }
    .clip-card .clip-info { padding: 12px; }
    .clip-card .clip-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
    .clip-card .clip-meta { font-size: 11px; color: var(--text-muted); }

    .clip-detail-player { position: relative; width: 100%; margin-bottom: 16px; }
    .clip-detail-player iframe,
    .clip-detail-player video {
      width: 100%; aspect-ratio: 16/9; border: none; border-radius: var(--radius); background: #000;
    }

    .comment-thread { margin-top: 16px; }
    .comment-item {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .comment-item:last-of-type { border-bottom: none; }
    .comment-text { font-size: 13px; line-height: 1.5; flex: 1; }
    .comment-time { font-size: 10px; color: var(--text-muted); white-space: nowrap; margin-left: 12px; }
    .comment-del {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 14px; padding: 0 4px; margin-left: 6px; opacity: 0.5;
    }
    .comment-del:hover { opacity: 1; color: var(--red); }

    .comment-input { display: flex; gap: 8px; margin-top: 12px; }
    .comment-input textarea {
      flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
      padding: 9px 12px; color: var(--text); font-size: 13px; font-family: inherit;
      outline: none; resize: none; min-height: 40px;
    }
    .comment-input textarea:focus { border-color: var(--accent); }
    .comment-input button {
      align-self: flex-end;
    }

    .yt-section { margin-top: 14px; }
    #detail-yt-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
    .yt-card {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      overflow: hidden; margin-bottom: 10px;
    }
    .yt-card iframe, .yt-card img, .yt-card video {
      width: 100%; aspect-ratio: 16/9; border: none; display: block; object-fit: cover; background: #000;
    }
    .yt-card { cursor: default; }
    .yt-card .yt-card-info {
      padding: 10px 12px; display: flex; align-items: center; justify-content: space-between;
    }
    .yt-card .yt-card-title { font-size: 12px; font-weight: 500; }
    .yt-card .yt-card-actions { display: flex; gap: 6px; }
    .yt-card .yt-card-actions button {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: 5px; padding: 4px 8px; font-size: 11px; cursor: pointer; font-family: inherit;
    }
    .yt-card .yt-card-actions button:hover { background: var(--border); }

    /* ---------- Rally Player ---------- */
    .rp-video-wrap { position: relative; width: 100%; margin-bottom: 14px; }
    .rp-video-wrap video {
      width: 100%; aspect-ratio: 16/9; border: none; border-radius: var(--radius); background: #000; display: block;
    }
    /* Transparent gesture layer over the picture; bottom strip left open for native controls */
    .rp-overlay { position: absolute; left: 0; right: 0; top: 0; bottom: 56px; cursor: pointer; }

    .rp-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .rp-mode { display: inline-flex; border: 1px solid var(--border); border-radius: 7px; overflow: hidden; }
    .rp-mode button {
      background: var(--surface2); border: none; color: var(--text-muted); font-size: 12px;
      padding: 7px 14px; cursor: pointer; font-family: inherit; font-weight: 600;
    }
    .rp-mode button.active { background: var(--accent-dim); color: var(--accent); }
    .rp-nav-btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: 7px; padding: 7px 14px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .rp-nav-btn:hover { background: var(--border); }
    .rp-rally-counter { font-size: 13px; font-weight: 600; min-width: 90px; }
    .rp-time-label { font-size: 12px; color: var(--text-muted); margin-left: auto; font-variant-numeric: tabular-nums; }

    .rp-scrub-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
    .rp-timeline {
      position: relative; height: 34px; background: var(--surface2); border-radius: 6px;
      cursor: pointer; overflow: hidden; touch-action: none; margin-bottom: 14px;
      border: 1px solid var(--border);
    }
    .rp-timeline .rp-seg {
      position: absolute; top: 0; bottom: 0; background: rgba(61, 184, 140, 0.4);
      border-left: 1px solid rgba(61, 184, 140, 0.9); border-right: 1px solid rgba(61, 184, 140, 0.9);
    }
    .rp-timeline .rp-seg.active { background: rgba(61, 184, 140, 0.75); }
    .rp-playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #fff; pointer-events: none; box-shadow: 0 0 4px rgba(0,0,0,0.6); z-index: 3; }
    .rp-markin-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--orange); pointer-events: none; z-index: 2; }
    .rp-rally-fill { position: absolute; top: 0; bottom: 0; left: 0; background: rgba(61, 184, 140, 0.55); pointer-events: none; }
    .rp-timeline.rp-disabled { opacity: 0.45; cursor: default; }
    .rp-scrub-times { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-top: -10px; margin-bottom: 14px; font-variant-numeric: tabular-nums; }

    .rp-mark-hint { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.5; }
    .rp-mark-hint kbd {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
      padding: 1px 6px; font-size: 11px; font-family: inherit; color: var(--text);
    }
    #rp-mark-status { color: var(--orange); font-weight: 600; }
    .rp-seg-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .rp-seg-row:last-of-type { border-bottom: none; }
    .rp-seg-row .rp-seg-idx { font-size: 12px; color: var(--text-muted); width: 24px; flex-shrink: 0; }
    .rp-seg-row input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; color: var(--text); font-size: 12px; font-family: inherit; outline: none; }
    .rp-seg-row input:focus { border-color: var(--accent); }
    .rp-seg-row .rp-in, .rp-seg-row .rp-out { width: 74px; font-variant-numeric: tabular-nums; }
    .rp-seg-row .rp-label { flex: 1; min-width: 60px; }
    .rp-seg-row .rp-seg-del { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 15px; padding: 2px 6px; border-radius: 4px; }
    .rp-seg-row .rp-seg-del:hover { color: var(--red); background: rgba(232,91,91,0.1); }
    .rp-seg-row.active { background: var(--accent-dim); border-radius: 6px; }
    #rp-bulk textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
      padding: 9px 12px; color: var(--text); font-size: 12px; font-family: monospace;
      outline: none; resize: vertical; min-height: 70px; margin-bottom: 10px;
    }

    /* Responsive */
    @media (max-width: 860px) {
      .sidebar { width: 56px; padding: 16px 6px; align-items: center; }
      .logo-sub, nav button span { display: none; }
      .logo { font-size: 16px; justify-content: center; }
      nav button { justify-content: center; padding: 9px; }
      .main { margin-left: 56px; padding: 18px 14px; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .dash-grid { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo"><span>10s</span></div>
      <div class="logo-sub">Tennis Tracker</div>
      <nav>
        <button class="active" data-page="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Dashboard</span>
        </button>
        <button data-page="log">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>Log Session</span>
        </button>
        <button data-page="sessions">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          <span>Sessions</span>
        </button>
        <button data-page="clips">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M10 8l6 4-6 4V8z"/></svg>
          <span>Clips</span>
        </button>
      </nav>
      <button id="admin-toggle" style="margin-top:auto;background:none;border:none;color:var(--text-muted);font-size:13px;padding:9px 12px;border-radius:7px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:9px;font-family:inherit;width:100%">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span>Admin</span>
      </button>
    </aside>

    <main class="main">
      <!-- Dashboard -->
      <div id="page-dashboard" class="page active">
        <div class="dash-header" id="dash-header"></div>
        <div class="stats-row" id="stats-row"></div>
        <div class="dash-grid">
          <div class="card" id="card-streak" style="grid-column: 1 / -1"></div>
          <div class="card" id="card-recent" style="grid-column: 1 / -1"></div>
        </div>
      </div>

      <!-- Log Session -->
      <div id="page-log" class="page">
        <h1 id="log-title">Log Session</h1>
        <div class="card">
          <div class="form-grid">
            <div class="form-group">
              <label>Date</label>
              <input type="date" id="f-date">
            </div>
            <div class="form-group">
              <label>Session Type</label>
              <select id="f-type">
                <option value="rally">Rally</option>
                <option value="match">Match</option>
                <option value="drill">Drill</option>
                <option value="tiebreak">Tiebreak</option>
                <option value="serve-practice">Serve Practice</option>
                <option value="vod-review">VOD Review</option>
              </select>
            </div>
            <div class="form-group">
              <label>Duration (minutes)</label>
              <input type="number" id="f-duration" placeholder="60" min="1">
            </div>
            <div class="form-group full">
              <label>Match Score (if applicable)</label>
              <input type="text" id="f-score" placeholder="e.g. 6-4, 3-6, 7-5">
            </div>
            <div class="form-group full">
              <label>Videos</label>
              <div class="upload-zone" id="upload-zone">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 15V3m0 0L8 7m4-4l4 4"/><path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
                <p>Drag &amp; drop videos here, or click to browse</p>
                <p class="hint">MP4 (H.264) plays everywhere. Large .MOV / HEVC files may only play in Safari.</p>
                <input type="file" id="f-videos" accept="video/*" multiple>
              </div>
              <div id="upload-progress" style="display:none;margin-top:10px"></div>
              <div class="upload-preview-list" id="video-previews"></div>
            </div>
            <div class="form-group full">
              <label>Notes</label>
              <textarea id="f-notes" placeholder="What went well? What to work on?"></textarea>
            </div>
          </div>
          <div class="btn-row">
            <button type="button" class="btn" id="save-session">Save Session</button>
            <button type="button" class="btn btn-secondary" id="cancel-edit" style="display:none">Cancel</button>
            <span id="form-error" style="color:var(--red);font-size:12px;display:none"></span>
          </div>
        </div>
      </div>

      <!-- Sessions List -->
      <div id="page-sessions" class="page">
        <h1>All Sessions</h1>
        <div class="card" id="all-sessions"></div>
      </div>

      <!-- Session Detail -->
      <div id="page-detail" class="page">
        <button class="detail-back" id="detail-back">&larr; Back to sessions</button>
        <div id="detail-content"></div>
      </div>

      <!-- Clips Browse -->
      <div id="page-clips" class="page">
        <div class="clips-header">
          <h1>Clips</h1>
          <button class="btn" id="new-clip-btn">+ New Clip</button>
        </div>
        <div id="clips-content"></div>
      </div>

      <!-- Clip Detail -->
      <div id="page-clip-detail" class="page">
        <button class="detail-back" id="clip-detail-back">&larr; Back to clips</button>
        <div id="clip-detail-content"></div>
      </div>

      <!-- Rally Player -->
      <div id="page-play" class="page">
        <button class="detail-back" id="play-back">&larr; Back to session</button>
        <div id="play-content"></div>
      </div>

      <!-- Calendar -->
    </main>
  </div>

  <div id="modal-root"></div>

  <script>
    // ===================== API LAYER =====================
    var api = {
      get: function(url) { return fetch(url).then(function(r) { return r.json(); }); },
      post: function(url, body) { return fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }).then(function(r) { return r.json(); }); },
      put: function(url, body) { return fetch(url, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }).then(function(r) { return r.json(); }); },
      del: function(url) { return fetch(url, { method: 'DELETE' }).then(function(r) { return r.json(); }); },
      upload: function(url, formData) { return fetch(url, { method: 'POST', body: formData }).then(function(r) { return r.json(); }); }
    };

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // ===================== AUTH =====================
    var isAdmin = false;

    function checkAuth() {
      return api.get('/api/auth/status').then(function(data) {
        isAdmin = data.isAdmin;
        applyAdminVisibility();
      });
    }

    function applyAdminVisibility() {
      var logNav = document.querySelector('nav button[data-page="log"]');
      logNav.style.display = isAdmin ? '' : 'none';

      var newClipBtn = document.getElementById('new-clip-btn');

      var adminBtn = document.getElementById('admin-toggle');
      adminBtn.querySelector('span').textContent = isAdmin ? 'Logout' : 'Admin';
    }

    document.getElementById('admin-toggle').addEventListener('click', function() {
      if (isAdmin) {
        api.post('/api/auth/logout', {}).then(function() {
          isAdmin = false;
          applyAdminVisibility();
          navigate(currentPage);
        });
        return;
      }
      var overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = '<div class="modal"><h3>Admin Login</h3>' +
        '<div class="form-group" style="margin-bottom:12px"><label>Password</label>' +
        '<input type="password" id="admin-pw" placeholder="Enter admin password"></div>' +
        '<span id="admin-error" style="color:var(--red);font-size:12px;display:none"></span>' +
        '<div class="btn-row"><button class="btn" id="admin-login-btn">Login</button>' +
        '<button class="btn btn-secondary" id="admin-cancel-btn">Cancel</button></div></div>';
      document.getElementById('modal-root').appendChild(overlay);
      overlay.querySelector('#admin-cancel-btn').onclick = function() { overlay.remove(); };
      overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
      overlay.querySelector('#admin-login-btn').onclick = function() {
        var pw = overlay.querySelector('#admin-pw').value;
        api.post('/api/auth/login', { password: pw }).then(function(data) {
          if (data.ok) {
            isAdmin = true;
            overlay.remove();
            applyAdminVisibility();
            navigate(currentPage);
          } else {
            var err = overlay.querySelector('#admin-error');
            err.textContent = data.error || 'Wrong password';
            err.style.display = 'block';
          }
        }).catch(function(e) {
          var err = overlay.querySelector('#admin-error');
          err.textContent = 'Login failed: ' + e.message;
          err.style.display = 'block';
        });
      };
      overlay.querySelector('#admin-pw').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') overlay.querySelector('#admin-login-btn').click();
      });
    });

    // ===================== NAV =====================
    var currentPage = 'dashboard';
    var editingId = null;

    var navBtns = document.querySelectorAll('nav button');
    navBtns.forEach(function(btn) {
      btn.addEventListener('click', function() { navigate(btn.dataset.page); });
    });

    window.navigate = function(page, opts) {
      if (page === 'log' && !isAdmin) { navigate('dashboard'); return; }
      var prevPage = currentPage;
      currentPage = page;
      if (prevPage === 'play' && page !== 'play') destroyRallyPlayer();
      document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
      document.getElementById('page-' + page).classList.add('active');
      navBtns.forEach(function(b) { b.classList.toggle('active', b.dataset.page === page); });

      // Update URL hash
      var skipHash = opts && opts.skipHash;
      if (!skipHash) {
        if (page === 'detail' && currentDetailId) {
          window.location.hash = '/session/' + currentDetailId;
        } else if (page === 'clip-detail' && currentClipId) {
          window.location.hash = '/clip/' + currentClipId;
        } else if (page === 'play' && currentPlayVideoId) {
          window.location.hash = '/play/' + currentPlayVideoId;
        } else {
          window.location.hash = '/' + page;
        }
      }

      if (page === 'dashboard') renderDashboard();
      else if (page === 'sessions') renderAllSessions();
      else if (page === 'log') setupLogForm();
      else if (page === 'clips') renderClipsPage();
      else if (page === 'clip-detail') { /* rendered by showClipDetail */ }
    };

    var currentDetailId = null;
    var currentClipId = null;
    var currentPlayVideoId = null;

    function handleRoute() {
      var hash = window.location.hash.replace('#', '') || '/dashboard';
      var parts = hash.split('/').filter(function(p) { return p; });
      var page = parts[0];
      var id = parts[1];

      if (page === 'session' && id) {
        showDetail(id);
      } else if (page === 'clip' && id) {
        showClipDetail(id);
      } else if (page === 'play' && id) {
        showRallyPlayer(id);
      } else if (['dashboard', 'sessions', 'log', 'clips'].indexOf(page) !== -1) {
        navigate(page, { skipHash: true });
      } else {
        navigate('dashboard', { skipHash: true });
      }
    }

    window.addEventListener('hashchange', handleRoute);

    // ===================== HELPERS =====================
    function fmt(d) {
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function shortDate(dateStr) {
      var d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function escapeHTML(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function sessionLabel(s) {
      var type = s.type.charAt(0).toUpperCase() + s.type.slice(1);
      var focus = s.focus ? s.focus.split(',')[0].trim() : '';
      return focus ? focus + ' ' + type.toLowerCase() : type;
    }

    function vidCount(s) { return s.video_count || s.videoCount || 0; }

    function parseTimeInput(val) {
      val = val.trim();
      if (val.indexOf(':') !== -1) {
        var parts = val.split(':');
        var m = parseInt(parts[0]);
        var s = parseInt(parts[1]);
        if (isNaN(m) || isNaN(s) || s < 0 || s >= 60) return null;
        return m * 60 + s;
      }
      var n = parseInt(val);
      return isNaN(n) || n < 0 ? null : n;
    }

    function formatTime(totalSeconds) {
      var m = Math.floor(totalSeconds / 60);
      var s = totalSeconds % 60;
      return m + ':' + String(s).padStart(2, '0');
    }

    // ===================== DASHBOARD =====================
    function renderDashboard() {
      api.get('/api/sessions').then(function(sessions) {
        var now = new Date();
        var quarter = Math.floor(now.getMonth() / 3) + 1;
        var quarterStartMonth = (quarter - 1) * 3;
        var quarterNames = ['Jan \u2013 Mar', 'Apr \u2013 Jun', 'Jul \u2013 Sep', 'Oct \u2013 Dec'];

        document.getElementById('dash-header').textContent =
          'Q' + quarter + ' ' + now.getFullYear() + ' \u2014 ' + quarterNames[quarter - 1];

        var thisQuarter = sessions.filter(function(s) {
          var d = new Date(s.date);
          return d.getFullYear() === now.getFullYear() && d.getMonth() >= quarterStartMonth && d.getMonth() < quarterStartMonth + 3;
        });

        var totalMin = thisQuarter.reduce(function(a, s) { return a + (parseInt(s.duration) || 0); }, 0);
        var totalHrs = (totalMin / 60).toFixed(1);

        document.getElementById('stats-row').innerHTML =
          '<div class="stat-card"><div class="label">Sessions</div><div class="value">' + thisQuarter.length + '</div><div class="sub">this quarter</div></div>' +
          '<div class="stat-card"><div class="label">Hours played</div><div class="value">' + totalHrs + '</div><div class="sub">this quarter</div></div>';

        renderStreakCard(sessions);
        renderRecentCard(sessions);
      });
    }

    var calSessions = [];
    var calViewMonth = 0;

    function renderStreakCard(sessions) {
      calSessions = sessions;
      var now = new Date();
      calViewMonth = now.getMonth();
      renderPracticeCalendar();
    }

    function renderPracticeCalendar() {
      var now = new Date();
      var quarter = Math.floor(now.getMonth() / 3);
      var qStart = quarter * 3;
      var qEnd = qStart + 2;
      var year = now.getFullYear();
      var monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

      var byDate = {};
      calSessions.forEach(function(s) { if (!byDate[s.date]) byDate[s.date] = []; byDate[s.date].push(s); });
      var dateSet = new Set(Object.keys(byDate));

      var firstDay = new Date(year, calViewMonth, 1).getDay();
      var daysInMonth = new Date(year, calViewMonth + 1, 0).getDate();
      var todayStr = fmt(now);

      var dayCount = 0;
      var cells = '';
      for (var e = 0; e < firstDay; e++) {
        cells += '<div class="cal-day empty"></div>';
      }
      for (var d = 1; d <= daysInMonth; d++) {
        var ds = year + '-' + String(calViewMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
        var cls = 'cal-day';
        if (dateSet.has(ds)) { cls += ' has-session'; dayCount++; }
        if (ds === todayStr) cls += ' today';
        cells += '<div class="' + cls + '" data-date="' + ds + '">' + d + '</div>';
      }

      var streak = 0;
      var check = new Date(now);
      check.setHours(0, 0, 0, 0);
      if (!dateSet.has(todayStr)) check.setDate(check.getDate() - 1);
      for (var j = 0; j < 365; j++) {
        if (dateSet.has(fmt(check))) { streak++; check.setDate(check.getDate() - 1); }
        else break;
      }

      document.getElementById('card-streak').innerHTML =
        '<div class="card-title">Practice calendar</div>' +
        '<div class="cal-header">' +
          '<button id="dash-cal-prev" ' + (calViewMonth <= qStart ? 'disabled' : '') + '>&lsaquo;</button>' +
          '<div class="cal-title">' + monthNames[calViewMonth] + ' ' + year + '</div>' +
          '<button id="dash-cal-next" ' + (calViewMonth >= qEnd ? 'disabled' : '') + '>&rsaquo;</button>' +
        '</div>' +
        '<div class="cal-weekdays"><div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div></div>' +
        '<div class="cal-grid" id="dash-cal-grid">' + cells + '</div>' +
        '<div class="cal-stats">' + dayCount + ' session day' + (dayCount !== 1 ? 's' : '') + ' this month &nbsp;&middot;&nbsp; Current streak: <strong>' + streak + ' days</strong></div>' +
        '<div class="cal-day-sessions" id="dash-cal-sessions" style="display:none"><div class="cal-day-label" id="dash-cal-day-label"></div><div id="dash-cal-day-list"></div></div>';

      document.getElementById('dash-cal-prev').addEventListener('click', function() {
        if (calViewMonth > qStart) { calViewMonth--; renderPracticeCalendar(); }
      });
      document.getElementById('dash-cal-next').addEventListener('click', function() {
        if (calViewMonth < qEnd) { calViewMonth++; renderPracticeCalendar(); }
      });

      document.getElementById('dash-cal-grid').querySelectorAll('.cal-day.has-session').forEach(function(el) {
        el.addEventListener('click', function() {
          var date = el.dataset.date;
          var ds = byDate[date];
          if (!ds) return;
          var dObj = new Date(date + 'T12:00:00');
          document.getElementById('dash-cal-day-label').textContent = dObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
          document.getElementById('dash-cal-day-list').innerHTML = ds.map(function(s) {
            var vc = vidCount(s);
            var vidBadge = vc > 0 ? '<span class="vid-badge">' + vc + ' vid' + (vc > 1 ? 's' : '') + '</span>' : '';
            return '<div class="session-row" data-id="' + s.id + '">' +
              '<div class="name">' + sessionLabel(s) + vidBadge + '</div>' +
              '<div class="date">' + shortDate(s.date) + '</div>' +
              '<div class="dur">' + s.duration + ' min</div></div>';
          }).join('');
          document.getElementById('dash-cal-sessions').style.display = 'block';
          document.getElementById('dash-cal-day-list').querySelectorAll('.session-row').forEach(function(row) {
            row.addEventListener('click', function() { showDetail(row.dataset.id); });
          });
        });
      });
    }

    function renderRecentCard(sessions) {
      var recent = sessions.slice(0, 4);
      var html = '<div class="card-title">Recent sessions</div>';
      if (recent.length === 0) {
        html += '<div class="empty-state"><p>No sessions yet</p></div>';
      } else {
        recent.forEach(function(s) {
          var vc = vidCount(s);
          var vidBadge = vc > 0 ? '<span class="vid-badge">' + vc + ' vid' + (vc > 1 ? 's' : '') + '</span>' : '';
          html += '<div class="session-row" data-id="' + s.id + '">' +
            '<div class="name">' + sessionLabel(s) + vidBadge + '</div>' +
            '<div class="date">' + shortDate(s.date) + '</div>' +
            '<div class="dur">' + s.duration + ' min</div></div>';
        });
      }
      if (isAdmin) html += '<button class="card-action" onclick="navigate(\'log\')">Log session &#8599;</button>';
      document.getElementById('card-recent').innerHTML = html;

      document.getElementById('card-recent').querySelectorAll('.session-row').forEach(function(el) {
        el.addEventListener('click', function() { showDetail(el.dataset.id); });
      });
    }


    // ===================== ALL SESSIONS =====================
    function renderAllSessions() {
      api.get('/api/sessions').then(function(sessions) {
        var el = document.getElementById('all-sessions');
        if (!sessions.length) {
          el.innerHTML = '<div class="empty-state"><div class="icon">&#127934;</div><p>No sessions logged yet.</p></div>';
          return;
        }
        el.innerHTML = sessions.map(function(s) {
          var vc = vidCount(s);

    document.getElementById('save-session').addEventListener('click', function() {
      var date = document.getElementById('f-date').value;
      var duration = document.getElementById('f-duration').value;
      var errEl = document.getElementById('form-error');

      if (!date || !duration) {
        errEl.textContent = 'Please fill in date and duration.';
        errEl.style.display = 'inline';
        return;
      }
      errEl.style.display = 'none';

      var data = {
        date: date,
        type: document.getElementById('f-type').value,
        duration: parseInt(duration),
        intensity: 'medium',
        focus: '',
        rating: 0,
        score: document.getElementById('f-score').value,
        notes: document.getElementById('f-notes').value
      };

      var saveBtn = document.getElementById('save-session');
      saveBtn.textContent = 'Saving...';
      saveBtn.disabled = true;

      function handleSaveError(err) {
        saveBtn.textContent = 'Save Session';
        saveBtn.disabled = false;
        var msg = (err && err.error) ? err.error : 'Failed to save. Make sure you are logged in as admin.';
        errEl.textContent = msg;
        errEl.style.display = 'inline';
      }

      if (editingId) {
        api.put('/api/sessions/' + editingId, data).then(function(result) {
          if (result.error) throw result;

        }).then(function() {
          saveBtn.textContent = 'Save Session';
          saveBtn.disabled = false;
          editingId = null;
          navigate('sessions');
        }).catch(handleSaveError);
      } else {
        api.post('/api/sessions', data).then(function(session) {
          if (session.error) throw session;
          return saveSessionVideos(session.id, saveBtn).then(function() { return session; });
        }).then(function() {

          saveBtn.disabled = false;
          navigate('dashboard');
        }).catch(handleSaveError);

    // ===================== VIDEO UPLOAD IN LOG FORM =====================
    var pendingVideoFiles = [];   // File objects queued for upload
    var existingVideos = [];      // already-saved videos (when editing)
    var removedVideoIds = [];     // saved videos the user removed

    (function initUploadZone() {
      var input = document.getElementById('f-videos');
      var zone = document.getElementById('upload-zone');
      if (!input || !zone) return;
      input.addEventListener('change', function() {
        for (var i = 0; i < input.files.length; i++) pendingVideoFiles.push(input.files[i]);
        input.value = '';
        renderVideoPreviews();
      });
      ['dragenter', 'dragover'].forEach(function(ev) {
        zone.addEventListener(ev, function(e) { e.preventDefault(); zone.classList.add('dragover'); });
      });
      ['dragleave', 'drop'].forEach(function(ev) {
        zone.addEventListener(ev, function(e) { e.preventDefault(); zone.classList.remove('dragover'); });
      });
      zone.addEventListener('drop', function(e) {
        var files = (e.dataTransfer && e.dataTransfer.files) ? e.dataTransfer.files : [];
        for (var i = 0; i < files.length; i++) {
          if (files[i].type.indexOf('video/') === 0) pendingVideoFiles.push(files[i]);
        }
        renderVideoPreviews();
      });
    })();

    function renderVideoPreviews() {
      var container = document.getElementById('video-previews');
      if (!container) return;
      var html = '';
      existingVideos.forEach(function(v, i) {
        html += '<div class="upload-preview-item">' +
          '<video src="' + escapeHTML(v.url) + '" preload="metadata" muted playsinline></video>' +
          '<div class="file-info">' +
          '<span style="font-size:10px;color:var(--accent);margin-right:4px">Saved</span>' +
          '<input type="text" value="' + escapeHTML(v.title) + '" data-existing-idx="' + i + '" placeholder="Video title" style="width:100%">' +
          '</div>' +
          '<button type="button" class="remove-btn" data-existing-rm="' + i + '">&times;</button></div>';
      });
      pendingVideoFiles.forEach(function(f, i) {
        html += '<div class="upload-preview-item">' +
          '<div style="width:80px;height:50px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-radius:4px;color:var(--text-muted)"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 8l6 4-6 4V8z"/></svg></div>' +
          '<div class="file-info"><div class="file-name">' + escapeHTML(f.name) + '</div>' +
          '<div class="file-size">' + formatSize(f.size) + '</div></div>' +
          '<button type="button" class="remove-btn" data-pending-rm="' + i + '">&times;</button></div>';
      });
      container.innerHTML = html;

      container.querySelectorAll('[data-existing-idx]').forEach(function(inp) {
        inp.addEventListener('input', function() {
          var v = existingVideos[parseInt(inp.dataset.existingIdx)];
          v.title = inp.value;
          v.titleChanged = true;
        });
      });
      container.querySelectorAll('[data-existing-rm]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var idx = parseInt(btn.dataset.existingRm);
          if (existingVideos[idx].id) removedVideoIds.push(existingVideos[idx].id);
          existingVideos.splice(idx, 1);
          renderVideoPreviews();
        });
      });
      container.querySelectorAll('[data-pending-rm]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          pendingVideoFiles.splice(parseInt(btn.dataset.pendingRm), 1);
          renderVideoPreviews();
        });
      });
    }

    function uploadVideosWithProgress(sessionId, files, onProgress) {
      return new Promise(function(resolve, reject) {
        var fd = new FormData();
        fd.append('sessionId', sessionId);
        files.forEach(function(f) { fd.append('videos', f); });
        var xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/videos');
        xhr.upload.onprogress = function(e) {
          if (e.lengthComputable && onProgress) onProgress(e.loaded, e.total);
        };
        xhr.onload = function() {
          if (xhr.status >= 200 && xhr.status < 300) {
            try { resolve(JSON.parse(xhr.responseText)); } catch (err) { resolve([]); }
          } else {
            var msg = 'Upload failed';
            try { msg = JSON.parse(xhr.responseText).error || msg; } catch (e) {}
            reject({ error: msg });
          }
        };
        xhr.onerror = function() { reject({ error: 'Upload failed (network error)' }); };
        xhr.send(fd);
      });
    }

    function saveSessionVideos(sessionId, saveBtn) {
      var tasks = [];
      removedVideoIds.forEach(function(id) { tasks.push(api.del('/api/videos/' + id)); });
      existingVideos.forEach(function(v) {
        if (v.id && v.titleChanged) tasks.push(api.put('/api/videos/' + v.id, { title: v.title }));
      });
      var chain = tasks.length ? Promise.all(tasks) : Promise.resolve();

      if (pendingVideoFiles.length) {
        var progressEl = document.getElementById('upload-progress');
        if (progressEl) {
          progressEl.style.display = 'block';
          progressEl.innerHTML = '<div style="font-size:12px;color:var(--text-muted)">Uploading ' + pendingVideoFiles.length + ' video(s)...</div>';
        }
        var files = pendingVideoFiles;
        chain = chain.then(function() {
          return uploadVideosWithProgress(sessionId, files, function(loaded, total) {
            if (saveBtn) saveBtn.textContent = 'Uploading ' + Math.round(loaded / total * 100) + '%';
          });
        }).then(function(res) {
          if (progressEl) progressEl.style.display = 'none';
          pendingVideoFiles = [];
          return res;
        });
      }
      return chain;
    }

    function showNewClipModal(preselectedVideoId) {

        var hiddenInput = preselectedVideoId ? '<input type="hidden" id="clip-video-hidden" value="' + preselectedVideoId + '">' : '';
        overlay.innerHTML = '<div class="modal" style="max-width:460px">' +
          '<h3>Create Clip</h3>' +
          hiddenInput +
          '<div class="form-group" style="margin-bottom:12px"><label>Video</label><select id="clip-video-select" style="width:100%"' + selectDisabled + '>' + videoOptions + '</select></div>' +
          '<div class="form-group" style="margin-bottom:12px"><label>Clip Title</label><input type="text" id="clip-title" placeholder="e.g. Backhand winner"></div>' +
          '<div style="display:flex;gap:10px;margin-bottom:12px">' +
          '<div class="form-group" style="flex:1"><label>Start Time (mm:ss)</label><input type="text" id="clip-start" placeholder="0:00" value="0:00"></div>' +
          '<div class="form-group" style="flex:1"><label>End Time (mm:ss)</label><input type="text" id="clip-end" placeholder="0:10" value="0:10"></div></div>' +
          '<div class="form-group" style="margin-bottom:16px"><label>Notes (optional)</label><textarea id="clip-notes" placeholder="What to notice in this clip..."></textarea></div>' +
          '<span id="clip-form-error" style="color:var(--red);font-size:12px;display:none"></span>' +
          '<div class="btn-row"><button class="btn" id="clip-save">Create Clip</button>' +
          '<button class="btn btn-secondary" id="clip-cancel">Cancel</button></div></div>';
        document.getElementById('modal-root').appendChild(overlay);
        overlay.querySelector('#clip-cancel').onclick = function() { overlay.remove(); };
        overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
        overlay.querySelector('#clip-save').onclick = function() {
          var hiddenEl = overlay.querySelector('#clip-video-hidden');
          var videoId = hiddenEl ? hiddenEl.value : overlay.querySelector('#clip-video-select').value;
          var title = overlay.querySelector('#clip-title').value.trim();
          var startTime = parseTimeInput(overlay.querySelector('#clip-start').value);
          var endTime = parseTimeInput(overlay.querySelector('#clip-end').value);
          var notes = overlay.querySelector('#clip-notes').value.trim();
          var errEl = overlay.querySelector('#clip-form-error');
          if (!videoId || !title) {
            errEl.textContent = 'Please select a video and enter a title.';
            errEl.style.display = 'inline';
            return;
          }
          if (startTime === null || endTime === null) {
            errEl.textContent = 'Use mm:ss format (e.g. 1:30) or just seconds (e.g. 90).';
            errEl.style.display = 'inline';
            return;
          }
          if (startTime >= endTime) {
            errEl.textContent = 'Start time must be less than end time.';
            errEl.style.display = 'inline';
            return;
          }
          api.post('/api/clips', {
            videoId: videoId,

          }).then(function(clip) {

          });
